<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Envelope body -->
  <rect x="40" y="80" width="120" height="80" rx="4" />
  <!-- Envelope flap (open) -->
  <polyline points="40,80 100,50 160,80" />
  <!-- Inner fold lines -->
  <line x1="40" y1="80" x2="90" y2="120" opacity="0.4" />
  <line x1="160" y1="80" x2="110" y2="120" opacity="0.4" />
  <!-- Floating dashed lines above envelope -->
  <line x1="72" y1="68" x2="128" y2="68" stroke-dasharray="4 3" opacity="0.7" />
  <line x1="78" y1="52" x2="122" y2="52" stroke-dasharray="4 3" opacity="0.5" />
  <line x1="84" y1="36" x2="116" y2="36" stroke-dasharray="4 3" opacity="0.3" />
</svg>
