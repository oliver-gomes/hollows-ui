<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Y axis -->
  <line x1="44" y1="40" x2="44" y2="152" />
  <!-- X axis / baseline (dashed) -->
  <line x1="40" y1="152" x2="168" y2="152" stroke-dasharray="5 3" />
  <!-- Bars at minimal/zero height -->
  <rect x="56" y="142" width="18" height="10" rx="2" opacity="0.3" />
  <rect x="84" y="138" width="18" height="14" rx="2" opacity="0.4" />
  <rect x="112" y="144" width="18" height="8" rx="2" opacity="0.25" />
  <rect x="140" y="140" width="18" height="12" rx="2" opacity="0.35" />
  <!-- Y-axis tick marks -->
  <line x1="40" y1="120" x2="44" y2="120" opacity="0.3" />
  <line x1="40" y1="88" x2="44" y2="88" opacity="0.3" />
  <line x1="40" y1="56" x2="44" y2="56" opacity="0.3" />
  <!-- Dashed grid lines -->
  <line x1="44" y1="120" x2="168" y2="120" stroke-dasharray="2 4" opacity="0.15" />
  <line x1="44" y1="88" x2="168" y2="88" stroke-dasharray="2 4" opacity="0.15" />
  <line x1="44" y1="56" x2="168" y2="56" stroke-dasharray="2 4" opacity="0.15" />
</svg>
